kind = "web"
previewPath = "/"
title = "Tyler T. Huntington"
version = "1.0.0"
id = "artifacts/tyler-t-huntington-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18878

[services.development]
run = "pnpm --filter @workspace/tyler-t-huntington-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tyler-t-huntington-website", "run", "build" ]
publicDir = "artifacts/tyler-t-huntington-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18878"
BASE_PATH = "/"
